name: 同步

on:
  workflow_dispatch:
  watch:
    types: [started]
  schedule:
    - cron: "0 * * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write          # 显式授予写入权限（可选，依赖于仓库设置）

    steps:
      - name: 设置时区
        run: sudo timedatectl set-timezone 'Asia/Shanghai'

      - name: 迁出代码（含完整历史）
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}   # 使用内置 token

      - name: 拉取远端最新代码（确保工作区干净）
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: 下载最新代理配置
        id: download
        run: |
          if ! curl -fsSL https://gist.githubusercontent.com/anaer/f0ba4dda0c0e106c9497bad193d9d3d9/raw/Work.yaml -o proxies.yaml; then
            echo "下载失败，请检查网络或源地址"
            exit 1
          fi
          ls -lh proxies.yaml

      - name: 检查是否有变更
        id: git-status
        run: |
          git diff --exit-code --quiet || echo "changed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: 提交并推送变更
        if: steps.git-status.outputs.changed == 'true'
        run: |
          git add .
          git commit -m "sync: $(date '+%Y-%m-%d %H:%M:%S')"
          # 将 remote URL 改为带 token 的形式，GITHUB_TOKEN 需要具有写入权限
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main

      - name: 删除旧的工作流运行记录
        uses: anaer/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 3
