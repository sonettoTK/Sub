name: 同步

on:
  workflow_dispatch:
  watch:
    types: [started]
  schedule:
    - cron: "0 * * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write

    steps:
      - name: 设置时区
        run: sudo timedatectl set-timezone 'Asia/Shanghai'

      - name: 迁出代码
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git 并拉取最新代码
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: 下载最新代理配置
        id: download
        run: |
          if ! curl -fsSL https://gist.githubusercontent.com/anaer/f0ba4dda0c0e106c9497bad193d9d3d9/raw/Work.yaml -o proxies.yaml; then
            echo "下载失败，请检查网络或源地址"
            exit 1
          fi
          ls -lh proxies.yaml

      - name: 检查 proxies.yaml 是否有变更
        id: yaml-changed
        run: |
          git diff --exit-code -- proxies.yaml || echo "yaml_changed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: 如果有变更，直接提交 proxies.yaml
        if: steps.yaml-changed.outputs.yaml_changed == 'true'
        run: |
          git add proxies.yaml
          git commit -m "sync: $(date '+%Y-%m-%d %H:%M:%S') (content updated)"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main

      - name: 如果无变更，更新时间戳文件强制产生提交
        if: steps.yaml-changed.outputs.yaml_changed != 'true'
        run: |
          echo "proxies.yaml 内容未变，更新时间戳文件"
          date '+%Y-%m-%d %H:%M:%S' > .last_sync
          git add .last_sync
          git commit -m "sync: $(date '+%Y-%m-%d %H:%M:%S') (no content change, forced timestamp)"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main

      - name: 删除旧的工作流运行记录
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          runs=$(gh api repos/${{ github.repository }}/actions/runs --paginate --jq '.workflow_runs[] | select(.created_at < "'$(date -d '1 day ago' -Iseconds)'") | .id')
          count=$(echo "$runs" | grep -c '^[0-9]\+$' || true)
          if [ $count -gt 3 ]; then
            echo "找到 $count 条旧记录，将删除最早 $((count - 3)) 条"
            echo "$runs" | tail -n +4 | while read id; do
              gh api -X DELETE repos/${{ github.repository }}/actions/runs/$id
            done
          else
            echo "旧记录不超过 3 条，无需删除"
          fi
